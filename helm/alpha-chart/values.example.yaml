secret:
  postgresName: "REPLACE_ME"
  postgresUser: "REPLACE"
  postgresPassword: "REPLACE_ME"
  databaseUrl: "REPLACE_ME"
  jwtPrivateKey: "REPLACE_ME"
  jwtPublicKey: "REPLACE_ME"
  mailgunApiKey: "REPLACE_ME"
  vapidPublicKey: "REPLACE_ME"
  vapidPrivateKey: "REPLACE_ME"

global:
  image:
    repository: ghcr.io/wwi21seb-projekt/alpha-services
    tag: latest
    pullPolicy: Always
  env:
    ENVIRONMENT: production
    OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    POSTGRES_DB:
      valueFrom:
        secretKeyRef:
          key: POSTGRES_NAME
          name: alpha-secrets
    POSTGRES_USER:
      valueFrom:
        secretKeyRef:
          key: POSTGRES_USER
          name: alpha-secrets
    POSTGRES_PASSWORD:
      valueFrom:
        secretKeyRef:
          key: POSTGRES_PASSWORD
          name: alpha-secrets
  resources:
    limits:
      memory: 100Mi

services:
  api-gateway:
    replicaCount: 1
    image:
      name: api-gateway
    port: 8080
    service:
      port: 80
    env:
      CHAT_SERVICE_URL: chat-service:50051
      IMAGE_SERVICE_URL: image-service:50052
      NOTIFICATION_SERVICE_URL: notification-service:50054
      POST_SERVICE_URL: post-service:50055
      USER_SERVICE_URL: user-service:50056
      JWT_PRIVATE_KEY:
        valueFrom:
          secretKeyRef:
            key: JWT_PRIVATE_KEY
            name: alpha-secrets
      JWT_PUBLIC_KEY:
        valueFrom:
          secretKeyRef:
            key: JWT_PUBLIC_KEY
            name: alpha-secrets


  chat-service:
    replicaCount: 1
    port: 50051
    service:
      port: 50051
    image:
      name: chat-service
    env:
      SCHEMA_NAME: chat_service
      USER_SERVICE_URL: user-service:50056

  image-service:
    replicaCount: 1
    port: 50052
    service:
      port: 50052
    image:
      name: image-service

  mail-service:
    replicaCount: 1
    port: 50053
    service:
      port: 50053
    image:
      name: mail-service
    env:
      MAILGUN_API_KEY:
        valueFrom:
          secretKeyRef:
            key: MAILGUN_API_KEY
            name: alpha-secrets

  notification-service :
    replicaCount: 1
    port: 50054
    service:
      port: 50054
    image:
      name: notification-service
    env:
      SCHEMA_NAME: notification_service
      USER_SERVICE_URL: user-service:50056
      VAPID_PUBLIC_KEY:
        valueFrom:
          secretKeyRef:
            name: alpha-secrets
            key: VAPID_PUBLIC_KEY
      VAPID_PRIVATE_KEY:
        valueFrom:
          secretKeyRef:
            name: alpha-secrets
            key: VAPID_PRIVATE_KEY

  post-service:
    replicaCount: 1
    port: 50055
    service:
      port: 50055
    image:
      name: post-service
    env:
      SCHEMA_NAME: post_service
      USER_SERVICE_URL: user-service:50056

  user-service:
    replicaCount: 1
    port: 50056
    service:
      port: 50056
    image:
      name: user-service
    env:
      SCHEMA_NAME: post_service
      IMAGE_SERVICE_URL: image-service:50052
      MAIL_SERVICE_URL: mail-service:50053
      NOTIFICATION_SERVICE_URL: notification-service:50054
      POST_SERVICE_URL: post-service:50055

postgresql:
  image:
    debug: true
  auth:
    username: "myuser"      # CHANGE THIS
    password: "mypassword"  # CHANGE THIS
    database: "mydatabase"  # CHANGE THIS
  primary:
    persistence:
      enabled: false
    initdb:
      scriptsConfigMap: init-db-scripts
    resources:
      limits:
        memory: 1Gi

opentelemetry-collector:
  mode: deployment
  image:
    repository: otel/opentelemetry-collector-contrib
  ports:
    metrics:
      enabled: true
    prometheus:
      enabled: true
      containerPort: 8889
      servicePort: 8889
      protocol: TCP
  serviceMonitor:
    enabled: true
    metricsEndpoints:
      - port: metrics
      - port: prometheus # This is the port of the prometheus receiver
  config:
    exporters:
      prometheus:
        endpoint: "0.0.0.0:8889"
      otlp/jaeger:
        endpoint: "alpha-release-jaeger-collector:4317" # If needed, replace with the correct endpoint
        tls:
          insecure: true
    service:
      pipelines:
        metrics:
          receivers:
            - otlp
          exporters:
            - prometheus
        traces:
          receivers:
            - otlp
          exporters:
            - otlp/jaeger

prometheus:
  enabled: true  # Turn this off if you dont want to deploy kube-prometheus-stack

kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      serviceMonitorSelectorNilUsesHelmValues: false
  alertmanager:
    enabled: false

jaeger:
  enabled: true
  provisionDataStore:
    cassandra: false
  allInOne:
    enabled: true
  storage:
    type: memory
  agent:
    enabled: false
  collector:
    enabled: false
  query:
    enabled: false
